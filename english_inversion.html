
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans)}
.app{max-width:100%}

.screen{display:none}.screen.on{display:block}

.top-bar{display:flex;align-items:center;gap:10px;padding:.75rem .75rem .5rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.back-btn{width:36px;height:36px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);touch-action:manipulation;flex-shrink:0}
.top-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.top-sub{font-size:12px;color:var(--color-text-tertiary);margin-left:auto}

.pad{padding:.75rem}

/* HOME */
.home-title{font-size:22px;font-weight:500;color:var(--color-text-primary);margin:.5rem 0 .25rem}
.home-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:1.25rem;line-height:1.5}

.unit-list{display:flex;flex-direction:column;gap:.5rem}
.unit-row{display:flex;align-items:center;gap:12px;padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);cursor:pointer;touch-action:manipulation;transition:background .12s}
.unit-row:active{background:var(--color-background-secondary)}
.unit-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.unit-info{flex:1}
.unit-name{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.unit-hint{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.unit-arrow{font-size:18px;color:var(--color-text-tertiary)}
.unit-done{font-size:12px;color:#27500A;background:#EAF3DE;padding:2px 8px;border-radius:99px}

/* THEORY stepper */
.step-dots{display:flex;gap:6px;justify-content:center;padding:.75rem 0 .5rem}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--color-border-secondary);transition:background .2s}
.sdot.on{background:var(--color-text-primary)}

.theory-slide{display:none}.theory-slide.on{display:block}

.slide-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
.slide-rule{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:.5rem;line-height:1.4}
.slide-desc{font-size:13px;color:var(--color-text-secondary);margin-bottom:.75rem;line-height:1.6}

.formula-box{padding:10px 12px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary);margin-bottom:.75rem;line-height:1.6}
.formula-box b{color:var(--color-text-primary);font-weight:500}

.compare{display:flex;flex-direction:column;gap:6px;margin-bottom:.75rem}
.sent-row{font-size:13px;padding:10px 12px;border-radius:var(--border-radius-md);line-height:1.5;border:0.5px solid var(--color-border-tertiary)}
.sent-row.normal{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.sent-row.inv{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4;font-weight:500}
.sent-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sent-label.a{color:var(--color-text-tertiary)}.sent-label.b{color:#185FA5}
.arrow-mid{text-align:center;font-size:18px;color:var(--color-text-tertiary);line-height:1}

.slide-nav{display:flex;gap:.5rem;margin-top:.75rem}
.snav{flex:1;min-height:48px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);touch-action:manipulation;font-family:var(--font-sans)}
.snav.pri{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.snav:active{opacity:.8}

/* PRACTICE */
.level-pills{display:flex;gap:.5rem;padding:.5rem .75rem;overflow-x:auto}
.lpill{padding:6px 14px;border-radius:99px;font-size:13px;border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;touch-action:manipulation;font-family:var(--font-sans)}
.lpill.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}

.prog-bar{height:4px;background:var(--color-background-secondary);margin:.25rem .75rem}
.prog-fill{height:100%;background:#1D9E75;border-radius:99px;transition:width .4s}

.q-wrap{padding:.75rem}
.q-num{font-size:12px;color:var(--color-text-tertiary);margin-bottom:.5rem}
.q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:.75rem}
.q-task{font-size:13px;color:var(--color-text-secondary);margin-bottom:.5rem}
.q-sent{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.5;padding:.6rem .75rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}

.opts{display:flex;flex-direction:column;gap:.5rem;margin-top:.75rem}
.opt{min-height:50px;padding:12px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);text-align:left;touch-action:manipulation;font-family:var(--font-sans);line-height:1.4;transition:background .1s}
.opt:active{background:var(--color-background-secondary)}
.opt.ok{background:#EAF3DE;color:#27500A;border-color:#97C459;font-weight:500}
.opt.bad{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.opt:disabled{cursor:default}

.tile-drop{min-height:52px;border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:.5rem;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;margin:.75rem 0;position:relative}
.drop-ph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;color:var(--color-text-tertiary);pointer-events:none;white-space:nowrap}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:44px;margin-bottom:.5rem}
.tile{padding:9px 13px;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid;touch-action:manipulation;user-select:none;min-height:42px;display:inline-flex;align-items:center;transition:transform .1s}
.tile:active{transform:scale(.92)}
.ptile{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.atile{background:#EAF3DE;color:#27500A;border-color:#97C459}
@keyframes blink{0%,100%{background:#EAF3DE}50%{background:#FCEBEB}}
.tile.err{animation:blink .35s}

.fb{font-size:13px;font-weight:500;padding:.6rem .75rem;border-radius:var(--border-radius-md);margin:.5rem 0;line-height:1.5}
.fb.ok{background:#EAF3DE;color:#27500A}.fb.bad{background:#FCEBEB;color:#791F1F}.fb.hint{background:#FAEEDA;color:#633806}

.btn-row{display:flex;gap:.5rem;margin-top:.5rem}
.btn{flex:1;min-height:48px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);touch-action:manipulation;font-family:var(--font-sans)}
.btn.pri{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn:active{opacity:.8}.btn:disabled{opacity:.35;cursor:default}
.clr{background:none;border:none;font-size:12px;color:var(--color-text-tertiary);text-decoration:underline;cursor:pointer;padding:2px 4px;touch-action:manipulation;font-family:var(--font-sans)}

/* RESULT */
.res{text-align:center;padding:2.5rem .75rem}
.res-n{font-size:56px;font-weight:500;color:var(--color-text-primary);line-height:1}
.res-of{font-size:14px;color:var(--color-text-secondary);margin:.25rem 0 .75rem}
.res-msg{font-size:14px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:1.5rem}
.res-btns{display:flex;flex-direction:column;gap:.5rem;padding:0 .5rem}
</style>

<div class="app">

<!-- HOME -->
<div id="home" class="screen on">
  <div class="pad">
    <div class="home-title">Inversiones en inglés</div>
    <div class="home-sub">Aprende paso a paso. Elige un tipo de inversión para empezar.</div>
    <div class="unit-list" id="unit-list"></div>
  </div>
</div>

<!-- THEORY -->
<div id="theory" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="go('home')">&#8592;</button>
    <div class="top-title" id="th-title">Teoría</div>
    <div class="top-sub" id="th-sub">1 / 3</div>
  </div>
  <div class="step-dots" id="sdots"></div>
  <div class="pad" id="th-slides"></div>
</div>

<!-- PRACTICE -->
<div id="practice" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="go('home')">&#8592;</button>
    <div class="top-title" id="pr-title">Práctica</div>
    <div class="top-sub" id="pr-pts">0 pts</div>
  </div>
  <div class="level-pills" id="level-pills"></div>
  <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
  <div id="q-area"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="res">
    <div class="res-n" id="r-n">0</div>
    <div class="res-of" id="r-of">de 10 puntos</div>
    <div class="res-msg" id="r-msg"></div>
    <div class="res-btns">
      <button class="btn pri" onclick="retryPractice()">Repetir nivel</button>
      <button class="btn" onclick="go('home')">Elegir otra inversión</button>
    </div>
  </div>
</div>

</div>

<script>
const UNITS=[
  {
    id:'neg',
    name:'Never / Rarely / Seldom',
    hint:'Adverbios negativos al inicio',
    color:{bg:'#EEEDFE',txt:'#3C3489'},
    num:'1',
    slides:[
      {
        label:'La regla',
        rule:'Cuando un adverbio negativo va al principio, sujeto y auxiliar se invierten.',
        desc:'Esto ocurre con: Never, Rarely, Seldom, Barely, Little, At no time…',
        formula:'<b>Adverbio negativo</b> + auxiliar + sujeto + verbo',
        pairs:[
          {a:'I have never seen this.',b:'Never have I seen this.'},
          {a:'She rarely goes out.',b:'Rarely does she go out.'},
        ]
      },
      {
        label:'Con "do/does/did"',
        rule:'En presente y pasado simple usamos do / does / did como auxiliar.',
        desc:'El verbo principal vuelve a su forma base sin -s ni -ed.',
        formula:'Rarely <b>does</b> she speak. — Little <b>did</b> I know.',
        pairs:[
          {a:'He seldom calls.',b:'Seldom does he call.'},
          {a:'I little knew the answer.',b:'Little did I know the answer.'},
        ]
      },
      {
        label:'Con "have / had"',
        rule:'En tiempos perfectos, have / has / had van directamente después del adverbio.',
        desc:'La forma del participio no cambia.',
        formula:'Never <b>have</b> I seen. — Rarely <b>has</b> she been.',
        pairs:[
          {a:'They had never experienced this.',b:'Never had they experienced this.'},
          {a:'She has rarely been late.',b:'Rarely has she been late.'},
        ]
      }
    ],
    levels:[
      {
        name:'Fácil',
        desc:'Identifica la inversión correcta',
        qs:[
          {sent:'I have never eaten sushi.',ans:'Never have I eaten sushi.',opts:['Never have I eaten sushi.','Never I have eaten sushi.']},
          {sent:'She rarely speaks in public.',ans:'Rarely does she speak in public.',opts:['Rarely does she speak in public.','Rarely she speaks in public.']},
          {sent:'They seldom visit us.',ans:'Seldom do they visit us.',opts:['Seldom they visit us.','Seldom do they visit us.']},
          {sent:'He had never seen the sea.',ans:'Never had he seen the sea.',opts:['Never had he seen the sea.','Never he had seen the sea.']},
          {sent:'I barely know him.',ans:'Barely do I know him.',opts:['Barely do I know him.','Barely I know him.']},
        ]
      },
      {
        name:'Medio',
        desc:'Construye la oración tocando las palabras',
        qs:[
          {sent:'I have never tasted anything so good.',words:['Never','have','I','tasted','anything','so','good.'],ans:'Never have I tasted anything so good.'},
          {sent:'She seldom arrives on time.',words:['Seldom','does','she','arrive','on','time.'],ans:'Seldom does she arrive on time.'},
          {sent:'We had rarely seen such chaos.',words:['Rarely','had','we','seen','such','chaos.'],ans:'Rarely had we seen such chaos.'},
          {sent:'He little knew what awaited him.',words:['Little','did','he','know','what','awaited','him.'],ans:'Little did he know what awaited him.'},
          {sent:'They have never been so happy.',words:['Never','have','they','been','so','happy.'],ans:'Never have they been so happy.'},
        ]
      },
      {
        name:'Difícil',
        desc:'Elige la forma correcta del auxiliar',
        qs:[
          {sent:'Never ___ he worked so hard.',blank:'had',opts:['has','had','have','did'],key:'had'},
          {sent:'Rarely ___ she sing in public.',blank:'does',opts:['do','does','has','had'],key:'does'},
          {sent:'Seldom ___ they seen such a storm.',blank:'have',opts:['had','have','do','did'],key:'have'},
          {sent:'Little ___ I understand the problem.',blank:'did',opts:['has','do','did','does'],key:'did'},
          {sent:'Never ___ I been so embarrassed.',blank:'have',opts:['had','has','have','do'],key:'have'},
        ]
      }
    ]
  },
  {
    id:'hard',
    name:'Hardly / No sooner',
    hint:'Dos cosas que pasan casi a la vez',
    color:{bg:'#E6F1FB',txt:'#0C447C'},
    num:'2',
    slides:[
      {
        label:'La regla',
        rule:'Hardly/Scarcely… when y No sooner… than expresan dos acciones casi simultáneas.',
        desc:'El primer verbo va en pasado perfecto (had + pp), el segundo en pasado simple.',
        formula:'<b>Hardly/Scarcely</b> + had + S + pp + <b>when</b> + S + past simple',
        pairs:[
          {a:'I had hardly sat down when the phone rang.',b:'Hardly had I sat down when the phone rang.'},
        ]
      },
      {
        label:'No sooner… than',
        rule:'"No sooner" funciona igual pero usa "than" en lugar de "when".',
        desc:'La estructura es idéntica: pasado perfecto invertido + than + pasado simple.',
        formula:'<b>No sooner</b> + had + S + pp + <b>than</b> + S + past simple',
        pairs:[
          {a:'She had no sooner left than it started raining.',b:'No sooner had she left than it started raining.'},
        ]
      }
    ],
    levels:[
      {
        name:'Fácil',
        desc:'Elige la inversión correcta',
        qs:[
          {sent:'I had hardly arrived when it started to rain.',ans:'Hardly had I arrived when it started to rain.',opts:['Hardly had I arrived when it started to rain.','Hardly I had arrived when it started to rain.']},
          {sent:'She had no sooner left than he called.',ans:'No sooner had she left than he called.',opts:['No sooner she had left than he called.','No sooner had she left than he called.']},
          {sent:'We had scarcely sat down when the alarm went off.',ans:'Scarcely had we sat down when the alarm went off.',opts:['Scarcely had we sat down when the alarm went off.','Scarcely we had sat down when the alarm went off.']},
          {sent:'He had hardly spoken when she interrupted.',ans:'Hardly had he spoken when she interrupted.',opts:['Hardly he had spoken when she interrupted.','Hardly had he spoken when she interrupted.']},
          {sent:'They had no sooner arrived than the show ended.',ans:'No sooner had they arrived than the show ended.',opts:['No sooner had they arrived than the show ended.','No sooner they arrived than the show ended.']},
        ]
      },
      {
        name:'Medio',
        desc:'Ordena las palabras',
        qs:[
          {sent:'I had hardly sat down when the phone rang.',words:['Hardly','had','I','sat','down','when','the','phone','rang.'],ans:'Hardly had I sat down when the phone rang.'},
          {sent:'She had no sooner left than it rained.',words:['No','sooner','had','she','left','than','it','rained.'],ans:'No sooner had she left than it rained.'},
          {sent:'We had scarcely arrived when the boss called.',words:['Scarcely','had','we','arrived','when','the','boss','called.'],ans:'Scarcely had we arrived when the boss called.'},
          {sent:'He had hardly finished when she asked for more.',words:['Hardly','had','he','finished','when','she','asked','for','more.'],ans:'Hardly had he finished when she asked for more.'},
        ]
      },
      {
        name:'Difícil',
        desc:'Elige "when" o "than"',
        qs:[
          {sent:'Hardly had I opened the door ___ the cat ran out.',blank:'when',opts:['when','than','that','as'],key:'when'},
          {sent:'No sooner had she sat down ___ the meeting started.',blank:'than',opts:['when','than','as','that'],key:'than'},
          {sent:'Scarcely had he left ___ the storm began.',blank:'when',opts:['than','when','that','before'],key:'when'},
          {sent:'No sooner had we arrived ___ it started to snow.',blank:'than',opts:['when','that','than','as'],key:'than'},
        ]
      }
    ]
  },
  {
    id:'notonly',
    name:'Not only… but also',
    hint:'Énfasis doble en dos ideas',
    color:{bg:'#FAEEDA',txt:'#633806'},
    num:'3',
    slides:[
      {
        label:'La regla',
        rule:'"Not only" al inicio invierte el auxiliar de la primera cláusula solamente.',
        desc:'La segunda parte (but also) mantiene el orden normal sujeto-verbo.',
        formula:'<b>Not only</b> + auxiliar + S + verbo … <b>but</b> (S) <b>also</b> + verbo',
        pairs:[
          {a:'He not only lied but also stole.',b:'Not only did he lie but he also stole.'},
          {a:'She not only sings but also plays guitar.',b:'Not only does she sing but she also plays guitar.'},
        ]
      },
      {
        label:'Recuerda',
        rule:'El verbo principal vuelve a su forma base (sin -s ni -ed).',
        desc:'"Not only did he lie" — "lie" no lleva -d porque el tiempo lo marca "did".',
        formula:'Not only <b>did</b> he <b>lie</b> (no "lied") but he also <b>stole</b>.',
        pairs:[
          {a:'They not only lost the match but also got injured.',b:'Not only did they lose the match but they also got injured.'},
        ]
      }
    ],
    levels:[
      {
        name:'Fácil',
        desc:'Elige la forma correcta',
        qs:[
          {sent:'He not only lied but also stole money.',ans:'Not only did he lie but he also stole money.',opts:['Not only did he lie but he also stole money.','Not only he lied but also stole money.']},
          {sent:'She not only speaks French but also writes it.',ans:'Not only does she speak French but she also writes it.',opts:['Not only she speaks French but also writes it.','Not only does she speak French but she also writes it.']},
          {sent:'They not only won the cup but also broke the record.',ans:'Not only did they win the cup but they also broke the record.',opts:['Not only they won the cup but also broke the record.','Not only did they win the cup but they also broke the record.']},
          {sent:'I not only finished but also helped others.',ans:'Not only did I finish but I also helped others.',opts:['Not only did I finish but I also helped others.','Not only I finished but also helped others.']},
        ]
      },
      {
        name:'Medio',
        desc:'Construye la inversión',
        qs:[
          {sent:'He not only lied but also stole.',words:['Not','only','did','he','lie','but','he','also','stole.'],ans:'Not only did he lie but he also stole.'},
          {sent:'She not only sings but also plays guitar.',words:['Not','only','does','she','sing','but','she','also','plays','guitar.'],ans:'Not only does she sing but she also plays guitar.'},
          {sent:'They not only arrived late but also forgot the keys.',words:['Not','only','did','they','arrive','late','but','they','also','forgot','the','keys.'],ans:'Not only did they arrive late but they also forgot the keys.'},
        ]
      },
      {
        name:'Difícil',
        desc:'Elige el auxiliar correcto',
        qs:[
          {sent:'Not only ___ he lie but he also stole.',blank:'did',opts:['does','did','has','had'],key:'did'},
          {sent:'Not only ___ she sing but she also dances.',blank:'does',opts:['do','did','does','has'],key:'does'},
          {sent:'Not only ___ they finished but they also won.',blank:'had',opts:['did','do','have','had'],key:'had'},
          {sent:'Not only ___ I apologized but I also offered help.',blank:'did',opts:['have','had','did','do'],key:'did'},
        ]
      }
    ]
  },
  {
    id:'so',
    name:'So / Neither',
    hint:'Expresar acuerdo rápido',
    color:{bg:'#EAF3DE',txt:'#27500A'},
    num:'4',
    slides:[
      {
        label:'So — acuerdo positivo',
        rule:'"So" expresa que alguien más también hace algo afirmativo.',
        desc:'El auxiliar debe coincidir con el tiempo verbal de la frase original.',
        formula:'<b>So</b> + auxiliar + sujeto',
        pairs:[
          {a:'I love pizza. — Me too.',b:'So do I.'},
          {a:'She has finished. — Me too.',b:'So have I.'},
          {a:'They were tired. — We too.',b:'So were we.'},
        ]
      },
      {
        label:'Neither / Nor — acuerdo negativo',
        rule:'"Neither" o "Nor" expresan que alguien tampoco hace algo negativo.',
        desc:'Se usa con frases negativas. El auxiliar va en forma afirmativa.',
        formula:'<b>Neither/Nor</b> + auxiliar + sujeto',
        pairs:[
          {a:"I can't swim. — Me neither.",b:'Neither can I.'},
          {a:"He hasn't eaten. — She neither.",b:'Neither has she.'},
        ]
      }
    ],
    levels:[
      {
        name:'Fácil',
        desc:'Elige la respuesta correcta',
        qs:[
          {sent:'I love chocolate. (Yo también)',ans:'So do I.',opts:['So do I.','So I do.']},
          {sent:"She can't drive. (Él tampoco)",ans:'Neither can he.',opts:['Neither can he.','Neither he can.']},
          {sent:'They have finished. (Nosotros también)',ans:'So have we.',opts:['So we have.','So have we.']},
          {sent:"He won't come. (Ella tampoco)",ans:'Neither will she.',opts:['Neither she will.','Neither will she.']},
          {sent:'We were happy. (Ellos también)',ans:'So were they.',opts:['So they were.','So were they.']},
          {sent:"I haven't eaten. (Tú tampoco)",ans:'Neither have you.',opts:['Neither have you.','Neither you have.']},
        ]
      },
      {
        name:'Medio',
        desc:'Ordena las palabras',
        qs:[
          {sent:'I love music. (Yo también)',words:['So','do','I.'],ans:'So do I.'},
          {sent:"She can't sing. (Él tampoco)",words:['Neither','can','he.'],ans:'Neither can he.'},
          {sent:'They have arrived. (Nosotros también)',words:['So','have','we.'],ans:'So have we.'},
          {sent:"I wasn't there. (Yo tampoco)",words:['Neither','was','I.'],ans:'Neither was I.'},
          {sent:'He will help. (Ella también)',words:['So','will','she.'],ans:'So will she.'},
        ]
      },
      {
        name:'Difícil',
        desc:'Elige el auxiliar correcto',
        qs:[
          {sent:'So ___ I. (I love it too)',blank:'do',opts:['am','do','have','did'],key:'do'},
          {sent:'Neither ___ she. (She also cannot)',blank:'can',opts:['does','is','can','has'],key:'can'},
          {sent:'So ___ we. (We also finished)',blank:'have',opts:['do','had','have','are'],key:'have'},
          {sent:'Neither ___ I. (I also was not there)',blank:'was',opts:['did','were','am','was'],key:'was'},
          {sent:'So ___ they. (They also went)',blank:'did',opts:['do','were','did','have'],key:'did'},
        ]
      }
    ]
  },
  {
    id:'cond',
    name:'Had / Were / Should',
    hint:'Condicionales sin "if"',
    color:{bg:'#E1F5EE',txt:'#085041'},
    num:'5',
    slides:[
      {
        label:'La regla',
        rule:'En condicionales formales, se elimina "if" y se invierte el auxiliar al inicio.',
        desc:'Tres tipos: Had (3ª cond.), Were (2ª cond.), Should (1ª cond. formal).',
        formula:'<b>Had</b> + S + pp… / <b>Were</b> + S + to/adj… / <b>Should</b> + S + inf…',
        pairs:[
          {a:'If I had known, I would have helped.',b:'Had I known, I would have helped.'},
          {a:'If she were here, she would understand.',b:'Were she here, she would understand.'},
          {a:'If you should need help, call me.',b:'Should you need help, call me.'},
        ]
      },
      {
        label:'¿Cuándo usar cada una?',
        rule:'"Had" = situación pasada imaginaria. "Were" = presente/futuro imposible. "Should" = posibilidad futura formal.',
        desc:'Estas formas son muy comunes en inglés escrito formal y literario.',
        formula:'Had I <b>known</b> (pasado) — Were I <b>you</b> (presente) — Should you <b>need</b> (futuro)',
        pairs:[
          {a:'If I were you, I would accept.',b:'Were I you, I would accept.'},
          {a:'If they had called, we would have answered.',b:'Had they called, we would have answered.'},
        ]
      }
    ],
    levels:[
      {
        name:'Fácil',
        desc:'Elige la inversión correcta',
        qs:[
          {sent:'If I had known, I would have helped.',ans:'Had I known, I would have helped.',opts:['Had I known, I would have helped.','Had I knew, I would have helped.']},
          {sent:'If she were here, she would understand.',ans:'Were she here, she would understand.',opts:['Were she here, she would understand.','If were she here, she would understand.']},
          {sent:'If you should need help, please call.',ans:'Should you need help, please call.',opts:['Should you need help, please call.','Should you needed help, please call.']},
          {sent:'If they had arrived earlier, they would have met him.',ans:'Had they arrived earlier, they would have met him.',opts:['Had they arrived earlier, they would have met him.','They had arrived earlier, they would have met him.']},
          {sent:'If it were to rain, we would cancel.',ans:'Were it to rain, we would cancel.',opts:['Were it to rain, we would cancel.','If were it to rain, we would cancel.']},
        ]
      },
      {
        name:'Medio',
        desc:'Construye la oración',
        qs:[
          {sent:'If I had known, I would have helped.',words:['Had','I','known,','I','would','have','helped.'],ans:'Had I known, I would have helped.'},
          {sent:'If she were here, she would understand.',words:['Were','she','here,','she','would','understand.'],ans:'Were she here, she would understand.'},
          {sent:'If you should need help, call me.',words:['Should','you','need','help,','call','me.'],ans:'Should you need help, call me.'},
          {sent:'If they had left earlier, they would have caught it.',words:['Had','they','left','earlier,','they','would','have','caught','it.'],ans:'Had they left earlier, they would have caught it.'},
        ]
      },
      {
        name:'Difícil',
        desc:'Elige Had, Were o Should',
        qs:[
          {sent:'___ I known, I would have called you.',blank:'Had',opts:['Were','Had','Should','Have'],key:'Had'},
          {sent:'___ she here, she would help us.',blank:'Were',opts:['Had','Should','Were','Would'],key:'Were'},
          {sent:'___ you need assistance, press this button.',blank:'Should',opts:['Were','Had','Would','Should'],key:'Should'},
          {sent:'___ they arrived on time, they would have seen it.',blank:'Had',opts:['Should','Were','Had','Have'],key:'Had'},
          {sent:'___ it to happen again, we would be prepared.',blank:'Were',opts:['Had','Should','Were','Would'],key:'Were'},
        ]
      }

  }
];

let curUnit=null, curLevel=0, curQ=0, pts=0, tSel=[], tWords=[], hintU=false, answered=false;

function go(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));document.getElementById(s).classList.add('on')}

function buildHome(){
  const ul=document.getElementById('unit-list');
  ul.innerHTML=UNITS.map((u,i)=>`
    <div class="unit-row" onclick="openUnit(${i})">
      <div class="unit-dot" style="background:${u.color.bg};color:${u.color.txt}">${u.num}</div>
      <div class="unit-info">
        <div class="unit-name">${u.name}</div>
        <div class="unit-hint">${u.hint}</div>
      </div>
      <div class="unit-arrow">›</div>
    </div>`).join('');
}

function openUnit(i){
  curUnit=UNITS[i];
  document.getElementById('th-title').textContent=curUnit.name;
  buildTheory();
  go('theory');
}

function buildTheory(){
  const slides=curUnit.slides;
  const dotsEl=document.getElementById('sdots');
  dotsEl.innerHTML=slides.map((_,i)=>`<div class="sdot${i===0?' on':''}" id="sd${i}"></div>`).join('');
  document.getElementById('th-sub').textContent='1 / '+slides.length;
  const cont=document.getElementById('th-slides');
  cont.innerHTML=slides.map((s,i)=>`
    <div class="theory-slide${i===0?' on':''}" id="ts${i}">
      <div class="slide-label">${s.label}</div>
      <div class="slide-rule">${s.rule}</div>
      <div class="slide-desc">${s.desc}</div>
      <div class="formula-box">${s.formula}</div>
      <div class="compare">${s.pairs.map(p=>`
        <div>
          <div class="sent-label a">Normal</div>
          <div class="sent-row normal">${p.a}</div>
        </div>
        <div class="arrow-mid">↓</div>
        <div>
          <div class="sent-label b">Invertida</div>
          <div class="sent-row inv">${p.b}</div>
        </div>`).join('<div style="height:.5rem"></div>')}</div>
      <div class="slide-nav">
        ${i>0?`<button class="snav" onclick="thSlide(${i-1})">← Anterior</button>`:''}
        ${i<slides.length-1?`<button class="snav pri" onclick="thSlide(${i+1})">Siguiente →</button>`:`<button class="snav pri" onclick="startPractice()">Practicar →</button>`}
      </div>
    </div>`).join('');
}

function thSlide(n){
  const slides=curUnit.slides;
  document.querySelectorAll('.theory-slide').forEach((s,i)=>s.classList.toggle('on',i===n));
  document.querySelectorAll('.sdot').forEach((d,i)=>d.classList.toggle('on',i===n));
  document.getElementById('th-sub').textContent=(n+1)+' / '+slides.length;
}

function startPractice(lvl){
  curLevel=lvl!==undefined?lvl:0;curQ=0;pts=0;answered=false;
  document.getElementById('pr-title').textContent=curUnit.name;
  document.getElementById('pr-pts').textContent='0 pts';
  buildLevelPills();
  go('practice');
  showQ();
}

function retryPractice(){startPractice(curLevel)}

function buildLevelPills(){
  const pills=document.getElementById('level-pills');
  pills.innerHTML=curUnit.levels.map((l,i)=>`<button class="lpill${i===curLevel?' on':''}" onclick="startPractice(${i})">${l.name}</button>`).join('');
}

function shuffle(a){return a.slice().sort(()=>Math.random()-.5)}

function showQ(){
  const lev=curUnit.levels[curLevel];
  const qs=lev.qs;
  answered=false;hintU=false;tSel=[];
  document.getElementById('pfill').style.width=(curQ/qs.length*100)+'%';
  const q=qs[curQ];
  let html='<div class="q-wrap">';
  html+=`<div class="q-num">Pregunta ${curQ+1} de ${qs.length} &nbsp;·&nbsp; ${lev.name}</div>`;
  html+='<div class="q-card">';

  if(q.opts&&q.opts.length===2){
    html+=`<div class="q-task">${lev.desc}</div>`;
    html+=`<div class="q-sent">${q.sent}</div>`;
    html+='<div class="opts" style="margin-top:.75rem">'+shuffle(q.opts).map(o=>
      `<button class="opt" onclick="pickOpt(this,'${o.replace(/'/g,"\\'")}','${q.ans.replace(/'/g,"\\'")}')"><span>${o}</span></button>`).join('')+'</div>';

  } else if(q.words){
    tWords=shuffle(q.words);
    html+=`<div class="q-task">${lev.desc}</div>`;
    html+=`<div class="q-sent">${q.sent}</div>`;
    html+=`<div class="tile-drop" id="drop" onclick="popTile()"><span class="drop-ph" id="dph">Tu respuesta aquí</span></div>`;
    html+=`<div style="display:flex;justify-content:flex-end"><button class="clr" onclick="clrTiles()">Borrar todo</button></div>`;
    html+=`<div class="pool" id="pool"></div>`;
    html+='<div id="fb"></div>';
    html+=`<div class="btn-row"><button class="btn" id="bh" onclick="hintTile('${q.words[0]}')">Pista</button><button class="btn pri" id="bc" onclick="chkTile('${q.ans.replace(/'/g,"\\'")}')">Comprobar</button><button class="btn" id="bn" onclick="nextQ()" style="display:none;flex:2">Siguiente →</button></div>`;

  } else if(q.key){
    html+=`<div class="q-task">${lev.desc}</div>`;
    const parts=q.sent.split('___');
    html+=`<div class="q-sent">${parts[0]}<span id="blank" style="display:inline-block;min-width:60px;padding:2px 8px;border-bottom:2px solid var(--color-border-secondary);text-align:center;color:var(--color-text-tertiary)">___</span>${parts[1]}</div>`;
    html+='<div class="opts" style="margin-top:.75rem">'+shuffle(q.opts).map(o=>
      `<button class="opt" onclick="pickFill(this,'${o}','${q.key}')">${o}</button>`).join('')+'</div>';
  }

  html+='</div></div>';
  document.getElementById('q-area').innerHTML=html;
  if(q.words) renderPool();
}

function pickOpt(el,chosen,ans){
  if(answered) return; answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  el.classList.add(chosen===ans?'ok':'bad');
  if(chosen===ans){if(!hintU){pts+=2}else{pts+=1}; document.getElementById('pr-pts').textContent=pts+' pts';}
  else document.querySelectorAll('.opt').forEach(b=>{if(b.querySelector('span')&&b.querySelector('span').textContent===ans)b.classList.add('ok')});
  addNextBtn();
}

function pickFill(el,chosen,key){
  if(answered) return; answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const blk=document.getElementById('blank');
  el.classList.add(chosen===key?'ok':'bad');
  if(chosen===key){pts+=2;document.getElementById('pr-pts').textContent=pts+' pts';if(blk){blk.textContent=key;blk.style.color='#27500A';blk.style.borderColor='#97C459'}}
  else{if(blk){blk.textContent=chosen;blk.style.color='#791F1F';blk.style.borderColor='#F09595'};document.querySelectorAll('.opt').forEach(b=>{if(b.textContent===key)b.classList.add('ok')})}
  addNextBtn();
}

function addNextBtn(){
  const lev=curUnit.levels[curLevel];
  const btn=document.createElement('button');
  btn.className='btn pri';btn.style.cssText='width:100%;min-height:48px;margin-top:.75rem';
  btn.textContent=curQ+1<lev.qs.length?'Siguiente →':'Ver resultado';
  btn.onclick=nextQ;
  const qw=document.querySelector('.q-wrap');
  if(qw)qw.appendChild(btn);
}

function renderPool(){
  const pool=document.getElementById('pool'),drop=document.getElementById('drop');
  if(!pool||!drop) return;
  pool.innerHTML='';drop.innerHTML='';
  if(!tSel.length) drop.innerHTML='<span class="drop-ph" id="dph">Tu respuesta aquí</span>';
  tWords.forEach((w,i)=>{if(!tSel.includes(i)){const t=document.createElement('span');t.className='tile ptile';t.textContent=w;t.onclick=e=>{e.stopPropagation();tSel.push(i);renderPool()};pool.appendChild(t)}});
  tSel.forEach((i,p)=>{const t=document.createElement('span');t.className='tile atile';t.textContent=tWords[i];t.onclick=e=>{e.stopPropagation();tSel.splice(p,1);renderPool()};drop.appendChild(t)});
}
function popTile(){if(tSel.length){tSel.pop();renderPool()}}
function clrTiles(){tSel=[];renderPool()}

function chkTile(ans){
  if(answered) return;
  const fb=document.getElementById('fb');
  if(!tSel.length){if(fb)fb.innerHTML='<div class="fb hint">Selecciona las palabras primero.</div>';return}
  const got=tSel.map(i=>tWords[i]).join(' ');
  if(got===ans){
    answered=true;pts+=hintU?1:2;document.getElementById('pr-pts').textContent=pts+' pts';
    if(fb)fb.innerHTML='<div class="fb ok">Correcto! '+(hintU?'(+1 con pista)':'(+2)')+'</div>';
    const bc=document.getElementById('bc'),bh=document.getElementById('bh'),bn=document.getElementById('bn');
    if(bc)bc.style.display='none';if(bh)bh.disabled=true;if(bn)bn.style.display='';
  } else {
    if(fb)fb.innerHTML='<div class="fb bad">No es correcto. Inténtalo de nuevo.</div>';
    document.querySelectorAll('.atile').forEach(t=>{t.classList.remove('err');void t.offsetWidth;t.classList.add('err')});
  }
}
function hintTile(w){const fb=document.getElementById('fb');if(fb)fb.innerHTML=`<div class="fb hint">Pista: la primera palabra es "<b>${w}</b>"</div>`;hintU=true;const bh=document.getElementById('bh');if(bh)bh.disabled=true;}

function nextQ(){
  const lev=curUnit.levels[curLevel];
  curQ++;
  if(curQ>=lev.qs.length){showResult();return}
  showQ();
}

function showResult(){
  const max=curUnit.levels[curLevel].qs.length*2;
  const pct=Math.round(pts/max*100);
  document.getElementById('r-n').textContent=pts;
  document.getElementById('r-of').textContent='de '+max+' puntos — '+curUnit.levels[curLevel].name;
  document.getElementById('r-msg').textContent=pct>=80?'Excelente, dominas este tipo de inversión.':pct>=50?'Bien hecho, sigue practicando para dominarlo.':'Repasa la teoría e inténtalo de nuevo.';
  go('result');
}

buildHome();
</script>
